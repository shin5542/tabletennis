<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="卓球スコア">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>卓球スコア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --a-color: #3b82f6;
    --a-dim: #1d4ed8;
    --b-color: #ef4444;
    --b-dim: #b91c1c;
    --text: #f1f5f9;
    --muted: #64748b;
    --win: #22c55e;
    --border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    height: -webkit-fill-available;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    padding-top: max(1rem, env(safe-area-inset-top));
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
    padding-left: max(1rem, env(safe-area-inset-left));
    padding-right: max(1rem, env(safe-area-inset-right));
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
    width: 100%;
  }

  /* background grid lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--muted);
  }
  .set-info {
    font-size: 13px;
    color: var(--muted);
  }
  .set-info span { color: var(--text); font-weight: 700; }

  /* Name inputs */
  .name-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .name-wrap { position: relative; }
  .name-dot {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .name-dot.a { background: var(--a-color); }
  .name-dot.b { background: var(--b-color); }
  .name-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px 10px 30px;
    font-size: 16px; /* 16px以上でiOSのズームを防止 */
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .name-input:focus { border-color: rgba(255,255,255,0.25); }

  /* Scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 16px;
  }
  .score-side { text-align: center; }
  .score-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 1;
    transition: transform 0.1s;
  }
  .score-num.a { color: var(--a-color); }
  .score-num.b { color: var(--b-color); }
  .score-num.leading { filter: brightness(1.3); }
  .score-num.pop { animation: pop 0.2s ease; }
  @keyframes pop { 0%{transform:scale(1.25)} 100%{transform:scale(1)} }

  .score-sets {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .score-sets span { color: var(--text); font-weight: 700; font-size: 14px; }

  .divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .serve-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, transform 0.3s;
  }
  .serve-pip.serve-a { background: var(--a-color); transform: translateX(-12px); }
  .serve-pip.serve-b { background: var(--b-color); transform: translateX(12px); }
  .serve-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Big score buttons */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .score-btn {
    border: none;
    border-radius: 16px;
    padding: 0;
    height: 100px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, filter 0.1s;
    letter-spacing: 1px;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .score-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  .score-btn:active { transform: scale(0.96); filter: brightness(0.9); }
  .score-btn.btn-a { background: linear-gradient(135deg, var(--a-color), var(--a-dim)); }
  .score-btn.btn-b { background: linear-gradient(135deg, var(--b-color), var(--b-dim)); }
  .btn-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .btn-icon { font-size: 28px; }
  .btn-sub { font-size: 11px; opacity: 0.75; font-weight: 400; }

  /* Sub buttons */
  .sub-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .sub-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .sub-btn:active { background: var(--surface2); color: var(--text); }
  .sub-icon { font-size: 16px; }

  /* History strip */
  .history-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    overflow: hidden;
  }
  .history-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .history-dots { display: flex; gap: 5px; align-items: center; flex-wrap: nowrap; overflow: hidden; }
  .hdot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    animation: dotIn 0.2s ease;
  }
  @keyframes dotIn { from{transform:scale(0)} to{transform:scale(1)} }
  .hdot.a { background: var(--a-color); }
  .hdot.b { background: var(--b-color); }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    text-align: center;
    max-width: 300px;
    width: 90%;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-icon { font-size: 48px; margin-bottom: 12px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; margin-bottom: 8px; }
  .modal-body { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .modal-actions { display: flex; flex-direction: column; gap: 8px; }
  .modal-btn {
    border-radius: 10px;
    padding: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .modal-btn.primary { background: var(--win); color: #000; }
  .modal-btn.secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0);
    animation: ripple 0.5s linear;
    pointer-events: none;
  }
  @keyframes ripple { to{transform:scale(4);opacity:0} }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="title">🏓 TABLE TENNIS</div>
    <div class="set-info">第 <span id="setNum">1</span> セット</div>
  </div>

  <div class="name-row">
    <div class="name-wrap">
      <div class="name-dot a"></div>
      <input class="name-input" id="nameA" value="A" maxlength="8" />
    </div>
    <div class="name-wrap">
      <div class="name-dot b"></div>
      <input class="name-input" id="nameB" value="B" maxlength="8" />
    </div>
  </div>

  <div class="scoreboard">
    <div class="score-side">
      <div class="score-name" id="labelA">A</div>
      <div class="score-num a" id="scoreA">0</div>
      <div class="score-sets">セット <span id="setsA">0</span></div>
    </div>
    <div class="divider">
      <div class="vs">VS</div>
      <div class="serve-pip" id="servePip"></div>
      <div class="serve-label">サーブ</div>
    </div>
    <div class="score-side">
      <div class="score-name" id="labelB">B</div>
      <div class="score-num b" id="scoreB">0</div>
      <div class="score-sets">セット <span id="setsB">0</span></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="score-btn btn-a" id="btnA">
      <div class="btn-inner">
        <span class="btn-icon">🏓</span>
        <span id="btnLabelA">A が得点</span>
        <span class="btn-sub">タップ</span>
      </div>
    </button>
    <button class="score-btn btn-b" id="btnB">
      <div class="btn-inner">
        <span class="btn-icon">🏓</span>
        <span id="btnLabelB">B が得点</span>
        <span class="btn-sub">タップ</span>
      </div>
    </button>
  </div>

  <div class="sub-row">
    <button class="sub-btn" id="undoBtn">
      <span class="sub-icon">↩</span>取り消し
    </button>
    <button class="sub-btn" id="nextSetBtn">
      <span class="sub-icon">▶</span>次のセット
    </button>
    <button class="sub-btn" id="resetBtn">
      <span class="sub-icon">↺</span>全リセット
    </button>
  </div>

  <div class="history-strip">
    <div class="history-title">得点履歴</div>
    <div class="history-dots" id="historyDots"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-icon">🏆</div>
    <div class="modal-title" id="modalTitle">セット終了</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modalNext">次のセットへ</button>
      <button class="modal-btn secondary" id="modalReset">全リセット</button>
    </div>
  </div>
</div>

<script>
  // iOSのバウンス・ズーム防止
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick', e => e.preventDefault());
</script>
<script>
  const st = {
    scoreA: 0, scoreB: 0,
    setsA: 0, setsB: 0,
    set: 1,
    serve0: 'A',
    history: []
  };

  const WIN_PTS = 11;

  function names() {
    return {
      A: document.getElementById('nameA').value.trim() || 'A',
      B: document.getElementById('nameB').value.trim() || 'B'
    };
  }

  function calcServe() {
    const pts = st.scoreA + st.scoreB;
    const deuce = st.scoreA >= 10 && st.scoreB >= 10;
    const block = deuce ? 1 : 2;
    const sw = Math.floor(pts / block) % 2;
    return sw === 0 ? st.serve0 : (st.serve0 === 'A' ? 'B' : 'A');
  }

  function checkWin() {
    const a = st.scoreA, b = st.scoreB;
    if ((a >= WIN_PTS || b >= WIN_PTS) && Math.abs(a - b) >= 2) {
      return a > b ? 'A' : 'B';
    }
    return null;
  }

  function render() {
    const n = names();
    document.getElementById('labelA').textContent = n.A;
    document.getElementById('labelB').textContent = n.B;
    document.getElementById('btnLabelA').textContent = n.A + ' が得点';
    document.getElementById('btnLabelB').textContent = n.B + ' が得点';
    document.getElementById('scoreA').textContent = st.scoreA;
    document.getElementById('scoreB').textContent = st.scoreB;
    document.getElementById('setsA').textContent = st.setsA;
    document.getElementById('setsB').textContent = st.setsB;
    document.getElementById('setNum').textContent = st.set;

    const sa = document.getElementById('scoreA');
    const sb = document.getElementById('scoreB');
    sa.className = 'score-num a' + (st.scoreA > st.scoreB ? ' leading' : '');
    sb.className = 'score-num b' + (st.scoreB > st.scoreA ? ' leading' : '');

    const sv = calcServe();
    const pip = document.getElementById('servePip');
    pip.className = 'serve-pip serve-' + sv.toLowerCase();

    // history dots (last 20)
    const dots = document.getElementById('historyDots');
    dots.innerHTML = '';
    const recent = st.history.slice(-20);
    recent.forEach(p => {
      const d = document.createElement('div');
      d.className = 'hdot ' + p.toLowerCase();
      dots.appendChild(d);
    });
  }

  function popAnim(player) {
    const el = document.getElementById('score' + player);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  function addRipple(btn, e) {
    const rect = btn.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    const x = (e.clientX || rect.left + rect.width/2) - rect.left - size/2;
    const y = (e.clientY || rect.top + rect.height/2) - rect.top - size/2;
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
  }

  function addPoint(player, e) {
    if (document.getElementById('modalBackdrop').classList.contains('show')) return;
    if (e) addRipple(document.getElementById('btn' + player), e);
    st.history.push(player);
    if (player === 'A') st.scoreA++; else st.scoreB++;
    popAnim(player);
    const winner = checkWin();
    if (winner) {
      if (winner === 'A') st.setsA++; else st.setsB++;
      render();
      const n = names();
      document.getElementById('modalTitle').textContent = n[winner] + ' がセットを取得！';
      document.getElementById('modalBody').textContent =
        '第' + st.set + 'セット終了\n' +
        n.A + ' ' + st.setsA + ' — ' + st.setsB + ' ' + n.B;
      document.getElementById('modalBackdrop').classList.add('show');
    } else {
      render();
    }
  }

  function nextSet() {
    st.set++;
    st.scoreA = 0; st.scoreB = 0;
    st.history = [];
    st.serve0 = st.serve0 === 'A' ? 'B' : 'A';
    document.getElementById('modalBackdrop').classList.remove('show');
    render();
  }

  function fullReset() {
    Object.assign(st, {scoreA:0,scoreB:0,setsA:0,setsB:0,set:1,serve0:'A',history:[]});
    document.getElementById('modalBackdrop').classList.remove('show');
    render();
  }

  function undo() {
    if (!st.history.length) return;
    const last = st.history.pop();
    if (last === 'A') st.scoreA = Math.max(0, st.scoreA - 1);
    else st.scoreB = Math.max(0, st.scoreB - 1);
    render();
  }

  document.getElementById('btnA').addEventListener('click', e => addPoint('A', e));
  document.getElementById('btnB').addEventListener('click', e => addPoint('B', e));
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('nextSetBtn').addEventListener('click', () => {
    if (!document.getElementById('modalBackdrop').classList.contains('show')) {
      st.set++; st.scoreA=0; st.scoreB=0; st.history=[];
      st.serve0 = st.serve0==='A'?'B':'A'; render();
    }
  });
  document.getElementById('resetBtn').addEventListener('click', fullReset);
  document.getElementById('modalNext').addEventListener('click', nextSet);
  document.getElementById('modalReset').addEventListener('click', fullReset);
  document.getElementById('nameA').addEventListener('input', render);
  document.getElementById('nameB').addEventListener('input', render);

  render();
</script>
</body>
</html>
